server:
  port: 8888

app:
  api-prefix: /api/v1
  service:
    identity: http://localhost:8082/profile


logging:
  level:
    org.springframework.cloud.gateway: DEBUG

spring:
  cloud:
    gateway:
      server:
        routes:
          - id: identity_service
            uri: http://localhost:8081
            predicates:
              - Path=${app.api-prefix}/identity/**
            filters:
              - StripPrefix=2

          - id: profile_service
            uri: http://localhost:8082
            predicates:
              - Path=${app.api-prefix}/profile/**
            filters:
              - StripPrefix=2

          - id: notification_service
            uri: http://localhost:8083
            predicates:
              - Path=${app.api-prefix}/notification/**
            filters:
              - StripPrefix=2

          - id: event_service
            uri: http://localhost:8084
            predicates:
              - Path=${app.api-prefix}/event/**
            filters:
              - StripPrefix=2